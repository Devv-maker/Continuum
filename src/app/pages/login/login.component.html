<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:"><img src="assets/images/logo-dark.svg" alt="logo" /></a>
      </div>
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-end mb-4">
            <h3 class="mb-0"><b>Login</b></h3>
          </div>
          
          <form [formGroup]="loginForm">
            <div class="form-group mb-3">
              <label class="form-label">User Name</label>
              <input type="text" class="form-control" formControlName="username" />
            </div>
            
            <div class="form-group mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" />
            </div>
            
            <div class="d-flex mt-1 justify-content-between">
              <div class="form-group">
                <input class="form-check-input input-primary me-1" type="checkbox" id="customCheckc1" checked="" formControlName="remember" />
                <label class="form-check-label text-muted" for="customCheckc1">Keep me sign in</label>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button type="button" class="btn btn-primary" (click)="onLogin()">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
